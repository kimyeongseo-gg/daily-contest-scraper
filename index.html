<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영서햄의 실시간 공모전 레이더</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 2rem;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 2rem 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        a { color: #3498db; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; color: #2980b9; }
        hr { border: 0; height: 1px; background: #eaeaea; margin: 2rem 0; }
        .loading { text-align: center; color: #95a5a6; font-size: 1.1rem; margin: 3rem 0; }
        .footer { text-align: center; margin-top: 3rem; color: #7f8c8d; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 실시간 공모전 통합 레이더</h1>
        
        <div id="content" class="loading">
            데이터를 불러오는 중입니다. 잠시만 기다려주세요... ⏳
        </div>

        <div class="footer">
            Auto-generated by Kim Yeong-seo's Scraper Bot
        </div>
    </div>

    <script>
        // 💡 영서햄의 깃허브 저장소를 직접 타겟팅합니다.
        const repoOwner = 'kimyeongseo-gg';
        const repoName = 'daily-contest-scraper';
        
        // 깃허브 API를 통해 '가장 최근에 열린 이슈 딱 1개'만 가져옵니다.
        const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/issues?state=open&per_page=1`;

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error('API 호출 실패');
                return response.json();
            })
            .then(issues => {
                const contentDiv = document.getElementById('content');
                if (issues.length > 0) {
                    // 이슈의 본문(body)을 가져와서 마크다운을 HTML로 변환해 화면에 꽂아 넣습니다!
                    contentDiv.innerHTML = marked.parse(issues[0].body);
                } else {
                    contentDiv.innerHTML = '<p style="text-align:center;">아직 수집된 공모전 정보가 없습니다. 🧐</p>';
                }
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                document.getElementById('content').innerHTML = '<p style="text-align:center; color:#e74c3c;">데이터를 불러오는 데 실패했습니다. 잠시 후 다시 시도해주세요.</p>';
            });
    </script>

</body>
</html>
